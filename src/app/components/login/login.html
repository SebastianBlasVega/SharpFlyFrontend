<div class="bg-background-light dark:bg-background-dark min-h-screen flex items-center justify-center p-4 relative overflow-hidden">

  <!-- Background -->
  <div class="absolute inset-0 z-0">
    <div class="absolute inset-0 bg-slate-900/40 z-10"></div>
    <div
      class="w-full h-full bg-cover bg-center scale-105 blur-sm"
      style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBv3_DyJ3eKsniVwTpN_TfyiQrAr1J2Q8O_L4nMqp5hAtDUYNHuHZLF45CIeGywL1YuwrZUvRvAHEXbVVOPcc-fEihgDkkoaHn6rg4FgyXLRrbMt5MTOUEnopOL7QF1ox9s0mt0sARBfJF8rGoDyZhe_5LhVr9www6uG35h8KSxGnq-vWZup5KnFysy7HNxqGEiOA4BNQjTbT1REWQqU_fkOFh41RCmui-IXUslv4vRe1SbdhWgV0oL0d9BSHWNqzAhlNGQCuADr3kp');">
    </div>
  </div>

  <!-- Login Container -->
  <div class="relative z-20 w-full max-w-110">
    <div class="glass-effect rounded-xl shadow-2xl overflow-hidden flex flex-col">

      <!-- Logo -->
      <div class="pt-10 pb-6 flex flex-col items-center">
        <div class="bg-primary/10 p-3 rounded-full mb-4">
          <span class="material-symbols-outlined text-primary text-4xl"
            style="font-variation-settings: 'FILL' 1">flight_takeoff</span>
        </div>
        <h1 class="text-slate-900 text-2xl font-bold tracking-tight">Sharp Fly</h1>
        <p class="text-slate-500 text-sm mt-1">Acceso de personal autorizado</p>
      </div>

      <!-- Form -->
      <div class="px-8 pb-10">
        <form (ngSubmit)="login()" class="space-y-5">

          <!-- Username -->
          <div>
            <label class="block text-slate-700 text-sm font-semibold mb-1.5 ml-1">
              Username
            </label>
            <div class="relative flex items-center">
              <span class="material-symbols-outlined absolute left-4 text-slate-400 text-[20px]">
                person
              </span>
              <input
                [(ngModel)]="username"
                name="username"
                required
                type="text"
                placeholder="Ingrese sus credenciales"
                class="w-full pl-11 pr-4 py-3.5 bg-white/50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all text-slate-900 placeholder:text-slate-400"
              />
            </div>
          </div>

          <!-- Password -->
          <div>
            <label class="block text-slate-700 text-sm font-semibold mb-1.5 ml-1">
              Password
            </label>
            <div class="relative flex items-center">
              <span class="material-symbols-outlined absolute left-4 text-slate-400 text-[20px]">
                lock
              </span>
              <input
                [(ngModel)]="password"
                name="password"
                required
                type="password"
                placeholder="••••••••"
                class="w-full pl-11 pr-12 py-3.5 bg-white/50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all text-slate-900 placeholder:text-slate-400"
              />
            </div>
          </div>

          <!-- Button -->
          <button
            type="submit"
            class="w-full bg-primary hover:bg-primary/90 text-black font-semibold py-3.5 rounded-lg shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2 group"
          >
            <span>Sign In to Terminal</span>
            <span class="material-symbols-outlined text-[18px] group-hover:translate-x-1 transition-transform">
              arrow_forward
            </span>
          </button>

        </form>

      </div>
    </div>
  </div>

</div>
